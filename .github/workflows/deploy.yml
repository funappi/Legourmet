name: Robot Autonome Le Gourmet Premium

on:
  push:
    branches:
      - main
  schedule:
    # Se réveille automatiquement TOUS LES LUNDIS à minuit (UTC)
    - cron: '0 0 * * 1'

permissions:
  contents: write

jobs:
  prolongation-et-deploiement:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: 1. Interface - Déployer le design sur GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages

      - name: 2. Sécurité - Cliquer sur le bouton jaune (Prolonger de 30 jours)
        run: |
          curl -X POST https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USER }}/webapps/${{ secrets.PA_DOMAIN }}/extend/ \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"

      - name: 3. Redémarrage - Recharger le serveur PythonAnywhere
        run: |
          curl -X POST https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USER }}/webapps/${{ secrets.PA_DOMAIN }}/reload/ \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"
